spring.application.name=be-room-rental

# BE
server.servlet.context-path=${BE_URI_API}
server.port=8080

# DOMAIN FE
app.frontend.domain=${FE_DOMAIN}

# MONGODB
spring.mongodb.uri=${MONGODB_URI}

# EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# CLOUDINARY
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# VNP
vnp.url=${VNP_URL}
vnp.callback.path=${VNP_CALLBACK_PATH}
vnp.return.url=${app.frontend.domain}${vnp.callback.path}
vnp.tmn.code=${VNP_TMN_CODE}
vnp.hash.secret=${VNP_HASH_SECRET}

# ADMIN
app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# GOOGLE
app.google.client-id=${GOOGLE_CLIENT_ID}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
